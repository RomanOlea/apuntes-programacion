site_name: Apuntes Programación 1º DAM
site_url: https://RomanOlea.github.io/apuntes-programacion

theme:
  name: material
  language: es
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Hasiera: index.md
  - Programazioa:
    - Tema 0 — Oinarriak: programazioa/tema0-programazio-oinarriak.md
