site_name: Apuntes Programación 1º DAM
site_url: https://RomanOlea.github.io/apuntes-programacion

theme:
  name: material
  language: es
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
 - toc:
      toc_depth: 0
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Hasiera: index.md
  - Programazioa:
