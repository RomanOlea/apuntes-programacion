site_name: Apuntes Programación 1º DAM
site_url: https://RomanOlea.github.io/apuntes-programacion

theme:
  name: material
  language: es
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Hasiera: index.md
  - Programazioa:
    - Gaia 1 — Programazio Oinarriak:
      - 1.0 Programazio Oinarriak: programazioa/gaia1/tema0-programazio-oinarriak.md
      - 1.1 Aurkezpena: programazioa/gaia1/aurkezpena.md
      - 1.2 Ariketak: programazioa/gaia1/ariketak.md
