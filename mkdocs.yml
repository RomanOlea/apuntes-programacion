      - 1.1 — Programazio Oinarriak: programazioa/gaia1/programazio-oinarriak.md
      - 1.2 — Java Programazio Lengoaia: programazioa/gaia1/java-programazio-lengoaia.md      
      - 1.3 — Datuak, aldagaiak eta eragileak: programazioa/gaia1/datuak-aldagaiak-eragileak.md            
      - 1.4 — GEHIGARRI - Java Scanner: programazioa/gaia1/java-scanner.md            
      - 1.5 — GEHIGARRI - Mota bihurketa: programazioa/gaia1/mota-bihurketa.md            
      - 1.6 — GEHIGARRI - Konstanteak: programazioa/gaia1/konstanteak.md                  

